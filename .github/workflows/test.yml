name: Lint & test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: [self-hosted, guc-net-ci]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: pip install ruff pytest

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest tests/ -q
